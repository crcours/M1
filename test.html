<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Python - Les Listes</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
    }
    .code-editor {
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: monospace;
      padding: 1rem;
      border-radius: 0.75rem;
      overflow-x: auto;
      font-size: 14px;
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

function PythonListCourse() {

  const [activeSection, setActiveSection] = useState("intro");
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [showCorrection, setShowCorrection] = useState(false);

  const sections = [
    { id: "intro", title: "Introduction", icon: "📚" },
    { id: "indices", title: "Indices", icon: "🔢" },
    { id: "methods", title: "Méthodes", icon: "🛠️" },
    { id: "parcourir", title: "Parcourir", icon: "🔄" },
    { id: "qcm", title: "QCM", icon: "❓" },
    { id: "external", title: "Exercices", icon: "💪" }
  ];

  const qcm = {
    question: "Que retourne len([10, 20, 30]) ?",
    options: ["2", "3", "10", "Erreur"],
    correct: 1
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-green-900 via-teal-900 to-cyan-900 text-white">
      <div className="max-w-6xl mx-auto p-6">

        {/* HEADER */}
        <div className="text-center mb-10">
          <h1 className="text-5xl font-bold bg-gradient-to-r from-green-400 via-teal-400 to-cyan-400 bg-clip-text text-transparent">
            🐍 Python - Les Listes
          </h1>
          <p className="text-slate-300 text-lg mt-2">
            Cours interactif complet
          </p>
        </div>

        {/* NAVIGATION */}
        <div className="flex flex-wrap gap-4 justify-center mb-8">
          {sections.map(section =>
            section.id === "external" ? (
              <a
                key={section.id}
                href="https://crcours.github.io/tools/pythonexos?json=https://crcours.github.io/M1/json/exercices-listes.json"
                target="_blank"
                rel="noopener noreferrer"
                className="px-6 py-3 rounded-xl font-semibold bg-gradient-to-r from-teal-500 to-green-600 shadow-lg shadow-teal-500/50 hover:scale-105 transition"
              >
                {section.icon} {section.title} 🔗
              </a>
            ) : (
              <button
                key={section.id}
                onClick={() => {
                  setActiveSection(section.id);
                  setSelectedAnswer(null);
                  setShowCorrection(false);
                }}
                className={`px-6 py-3 rounded-xl font-semibold transition hover:scale-105 ${
                  activeSection === section.id
                    ? "bg-gradient-to-r from-teal-500 to-green-600 shadow-lg shadow-teal-500/50"
                    : "bg-slate-800 hover:bg-slate-700"
                }`}
              >
                {section.icon} {section.title}
              </button>
            )
          )}
        </div>

        {/* CONTENU */}
        <div className="bg-slate-800/60 backdrop-blur-md rounded-2xl p-8 shadow-2xl border border-slate-700">

          {/* INTRO */}
          {activeSection === "intro" && (
            <>
              <h2 className="text-3xl font-bold text-teal-400 mb-4">📚 Introduction</h2>
              <p className="mb-4 text-slate-200">
                Une liste est une collection ordonnée d'éléments.
              </p>
              <div className="code-editor">
{`prenoms = ["Alice", "Bob", "Charlie"]
notes = [15, 12, 18]

print(prenoms)
print(notes)`}
              </div>
            </>
          )}

          {/* INDICES */}
          {activeSection === "indices" && (
            <>
              <h2 className="text-3xl font-bold text-teal-400 mb-4">🔢 Les indices</h2>
              <div className="code-editor">
{`fruits = ["pomme", "banane", "cerise"]

print(fruits[0])
print(fruits[-1])`}
              </div>
            </>
          )}

          {/* METHODES */}
          {activeSection === "methods" && (
            <>
              <h2 className="text-3xl font-bold text-teal-400 mb-4">🛠️ Méthodes</h2>
              <div className="code-editor">
{`liste = []
liste.append("pain")
liste.append("lait")

print(len(liste))`}
              </div>
            </>
          )}

          {/* PARCOURIR */}
          {activeSection === "parcourir" && (
            <>
              <h2 className="text-3xl font-bold text-teal-400 mb-4">🔄 Parcourir</h2>
              <div className="code-editor">
{`nombres = [3, 7, 2]

total = 0
for n in nombres:
    total += n

print(total)`}
              </div>
            </>
          )}

          {/* QCM */}
          {activeSection === "qcm" && (
            <>
              <h2 className="text-3xl font-bold text-teal-400 mb-6">❓ QCM</h2>
              <p className="mb-4 text-lg">{qcm.question}</p>

              <div className="space-y-3">
                {qcm.options.map((option, index) => (
                  <button
                    key={index}
                    onClick={() => setSelectedAnswer(index)}
                    className={`block w-full text-left px-4 py-3 rounded-lg ${
                      selectedAnswer === index
                        ? "bg-teal-600"
                        : "bg-slate-700 hover:bg-slate-600"
                    }`}
                  >
                    {option}
                  </button>
                ))}
              </div>

              <button
                onClick={() => setShowCorrection(true)}
                className="mt-6 px-6 py-3 bg-green-600 rounded-xl hover:bg-green-500"
              >
                Vérifier
              </button>

              {showCorrection && (
                <div className="mt-4 text-lg font-semibold">
                  {selectedAnswer === qcm.correct
                    ? "✅ Bonne réponse !"
                    : "❌ Mauvaise réponse"}
                </div>
              )}
            </>
          )}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PythonListCourse />);
</script>
</body>
</html>
